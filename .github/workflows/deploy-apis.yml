name: WSO2 API Deployment Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'api-definitions/**'
  workflow_dispatch:

jobs:

  lint-api-specs:
    name: Lint OpenAPI Specifications
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run Spectral lint
        run: |
          spectral lint api-definitions/invoice-api.yaml --ruleset .spectral.yaml --fail-severity error
          spectral lint api-definitions/payment-api.yaml --ruleset .spectral.yaml --fail-severity error
          spectral lint api-definitions/shipment-api.yaml --ruleset .spectral.yaml --fail-severity error
          spectral lint api-definitions/route-api.yaml --ruleset .spectral.yaml --fail-severity error
          echo "All 4 specs passed lint"

  deploy-tenantA:
    name: Deploy TenantA — finance.com
    runs-on: self-hosted
    needs: lint-api-specs
    steps:
      - uses: actions/checkout@v4

      - name: Setup finance-prod environment
        run: |
          apictl remove env finance-prod 2>/dev/null || true
          apictl add env finance-prod \
            --apim https://localhost:9443 \
            --token https://localhost:9443/oauth2/token

      - name: Login to finance-prod
        run: |
          apictl login finance-prod \
            -u ${{ secrets.FINANCE_ADMIN_USER }} \
            -p ${{ secrets.FINANCE_ADMIN_PASSWORD }} \
            -k

      - name: List and verify TenantA APIs
        run: |
          echo "=== TenantA Published APIs ==="
          apictl get apis -e finance-prod -k
          echo "=== TenantA deployment verified ==="

      - name: Export InvoiceAPI artifact
        run: |
          mkdir -p exported
          apictl export api \
            --name InvoiceAPI \
            --version 1.0 \
            --provider alice@finance.com \
            --environment finance-prod \
            -k \
            --format JSON 2>/dev/null && echo "InvoiceAPI exported" || echo "Export skipped"

      - name: Export PaymentAPI artifact
        run: |
          apictl export api \
            --name PaymentAPI \
            --version 1.0 \
            --provider alice@finance.com \
            --environment finance-prod \
            -k \
            --format JSON 2>/dev/null && echo "PaymentAPI exported" || echo "Export skipped"

      - name: Logout
        if: always()
        run: apictl logout finance-prod -k 2>/dev/null || true

  deploy-tenantB:
    name: Deploy TenantB — logistics.com
    runs-on: self-hosted
    needs: lint-api-specs
    steps:
      - uses: actions/checkout@v4

      - name: Setup logistics-prod environment
        run: |
          apictl remove env logistics-prod 2>/dev/null || true
          apictl add env logistics-prod \
            --apim https://localhost:9443 \
            --token https://localhost:9443/oauth2/token

      - name: Login to logistics-prod
        run: |
          apictl login logistics-prod \
            -u ${{ secrets.LOGISTICS_ADMIN_USER }} \
            -p ${{ secrets.LOGISTICS_ADMIN_PASSWORD }} \
            -k

      - name: List and verify TenantB APIs
        run: |
          echo "=== TenantB Published APIs ==="
          apictl get apis -e logistics-prod -k
          echo "=== TenantB deployment verified ==="

      - name: Export ShipmentAPI artifact
        run: |
          apictl export api \
            --name ShipmentAPI \
            --version 1.0 \
            --provider carol@logistics.com \
            --environment logistics-prod \
            -k \
            --format JSON 2>/dev/null && echo "ShipmentAPI exported" || echo "Export skipped"

      - name: Export RouteAPI artifact
        run: |
          apictl export api \
            --name RouteAPI \
            --version 1.0 \
            --provider carol@logistics.com \
            --environment logistics-prod \
            -k \
            --format JSON 2>/dev/null && echo "RouteAPI exported" || echo "Export skipped"

      - name: Logout
        if: always()
        run: apictl logout logistics-prod -k 2>/dev/null || true

  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: self-hosted
    needs: [deploy-tenantA, deploy-tenantB]
    steps:
      - name: Get TenantA token
        id: tokenA
        run: |
          TOKEN=$(curl -k -s -X POST https://localhost:9443/oauth2/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${{ secrets.FINANCE_CLIENT_ID }}&client_secret=${{ secrets.FINANCE_CLIENT_SECRET }}&scope=invoice:read payment:read" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "TenantA token obtained"

      - name: Smoke test Invoice API
        run: |
          CODE=$(curl -k -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.tokenA.outputs.token }}" \
            https://localhost:8243/t/finance.com/invoices/1.0/invoices)
          echo "InvoiceAPI: $CODE"
          [ "$CODE" = "200" ] || (echo "FAILED: expected 200 got $CODE" && exit 1)

      - name: Smoke test Payment API
        run: |
          CODE=$(curl -k -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.tokenA.outputs.token }}" \
            https://localhost:8243/t/finance.com/paymentapi/1.0/payments)
          echo "PaymentAPI: $CODE"
          [ "$CODE" = "200" ] || (echo "FAILED: expected 200 got $CODE" && exit 1)

      - name: Get TenantB token
        id: tokenB
        run: |
          TOKEN=$(curl -k -s -X POST https://localhost:9443/oauth2/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${{ secrets.LOGISTICS_CLIENT_ID }}&client_secret=${{ secrets.LOGISTICS_CLIENT_SECRET }}&scope=shipment:read route:read" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "TenantB token obtained"

      - name: Smoke test Shipment API
        run: |
          CODE=$(curl -k -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.tokenB.outputs.token }}" \
            https://localhost:8243/t/logistics.com/shipmentapi/1.0/shipments)
          echo "ShipmentAPI: $CODE"
          [ "$CODE" = "200" ] || (echo "FAILED: expected 200 got $CODE" && exit 1)

      - name: Smoke test Route API
        run: |
          CODE=$(curl -k -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.tokenB.outputs.token }}" \
            https://localhost:8243/t/logistics.com/routeapi/1.0/routes)
          echo "RouteAPI: $CODE"
          [ "$CODE" = "200" ] || (echo "FAILED: expected 200 got $CODE" && exit 1)

      - name: Summary
        run: |
          echo "========================================="
          echo "All 4 APIs returned 200 — pipeline PASSED"
          echo "========================================="

  notify-slack:
    name: Slack Notification
    runs-on: self-hosted
    needs: [lint-api-specs, deploy-tenantA, deploy-tenantB, smoke-test]
    if: always()
    steps:
      - name: Send Slack notification
        run: |
          SMOKE="${{ needs.smoke-test.result }}"
          LINT="${{ needs.lint-api-specs.result }}"
          TENA="${{ needs.deploy-tenantA.result }}"
          TENB="${{ needs.deploy-tenantB.result }}"

          if [ "$SMOKE" = "success" ]; then
            EMOJI="✅"; COLOR="good"; MSG="All jobs passed — 4 APIs verified"
          elif [ "$LINT" = "failure" ]; then
            EMOJI="❌"; COLOR="danger"; MSG="Lint failed — deploy blocked"
          else
            EMOJI="⚠️"; COLOR="warning"; MSG="Pipeline failed — check logs"
          fi

          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"$EMOJI *WSO2 Pipeline — $MSG*\",
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"fields\": [
                  {\"title\":\"Repo\",\"value\":\"${{ github.repository }}\",\"short\":true},
                  {\"title\":\"Branch\",\"value\":\"${{ github.ref_name }}\",\"short\":true},
                  {\"title\":\"Actor\",\"value\":\"${{ github.actor }}\",\"short\":true},
                  {\"title\":\"Lint\",\"value\":\"$LINT\",\"short\":true},
                  {\"title\":\"TenantA\",\"value\":\"$TENA\",\"short\":true},
                  {\"title\":\"TenantB\",\"value\":\"$TENB\",\"short\":true},
                  {\"title\":\"Smoke Test\",\"value\":\"$SMOKE\",\"short\":true},
                  {\"title\":\"Run\",\"value\":\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"short\":false}
                ]
              }]
            }"
