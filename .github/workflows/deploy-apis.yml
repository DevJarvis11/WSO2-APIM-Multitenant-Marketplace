name: WSO2 API Deployment Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'api-definitions/**'
  workflow_dispatch:
    inputs:
      tenant:
        description: 'Deploy which tenant'
        required: true
        default: 'both'
        type: choice
        options: [both, tenantA, tenantB]

env:
  WSO2_HOST: localhost
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:

  lint-api-specs:
    name: Lint OpenAPI Specifications
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Spectral
        run: spectral --version || npm install -g @stoplight/spectral-cli

      - name: Create Spectral ruleset
        run: |
          cat > .spectral.yaml << 'SPECTRAL'
          extends: ["spectral:oas"]
          rules:
            api-must-have-description:
              message: "API must have a description"
              given: "$.info"
              severity: error
              then:
                field: description
                function: truthy
            api-must-have-contact:
              message: "API must have contact info"
              given: "$.info"
              severity: warn
              then:
                field: contact
                function: defined
          SPECTRAL

      - name: Lint all API specs
        run: |
          echo "Linting Invoice API..."
          spectral lint api-definitions/invoice-api.yaml --ruleset .spectral.yaml --fail-severity error
          echo "Linting Payment API..."
          spectral lint api-definitions/payment-api.yaml --ruleset .spectral.yaml --fail-severity error
          echo "Linting Shipment API..."
          spectral lint api-definitions/shipment-api.yaml --ruleset .spectral.yaml --fail-severity error
          echo "Linting Route API..."
          spectral lint api-definitions/route-api.yaml --ruleset .spectral.yaml --fail-severity error
          echo "All specs passed lint checks"

  deploy-tenantA:
    name: Deploy TenantA — finance.com
    runs-on: self-hosted
    needs: lint-api-specs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify apictl available
        run: apictl version

      - name: Remove existing environment if exists
        run: apictl remove env finance-prod -k 2>/dev/null || true

      - name: Add WSO2 environment
        run: |
          apictl add env finance-prod \
            --apim https://localhost:9443 \
            --token https://localhost:9443/oauth2/token

      - name: Login to WSO2 TenantA
        run: |
          apictl login finance-prod \
            -u ${{ secrets.FINANCE_ADMIN_USER }} \
            -p ${{ secrets.FINANCE_ADMIN_PASSWORD }} \
            -k

      - name: Deploy Invoice API
        run: |
          apictl import api \
            -f api-definitions/invoice-api.yaml \
            -e finance-prod \
            -k --update
          echo "InvoiceAPI deployed"

      - name: Deploy Payment API
        run: |
          apictl import api \
            -f api-definitions/payment-api.yaml \
            -e finance-prod \
            -k --update
          echo "PaymentAPI deployed"

      - name: List deployed APIs
        run: apictl get apis -e finance-prod -k

      - name: Logout
        if: always()
        run: apictl logout finance-prod -k 2>/dev/null || true

  deploy-tenantB:
    name: Deploy TenantB — logistics.com
    runs-on: self-hosted
    needs: lint-api-specs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify apictl available
        run: apictl version

      - name: Remove existing environment if exists
        run: apictl remove env logistics-prod -k 2>/dev/null || true

      - name: Add WSO2 environment
        run: |
          apictl add env logistics-prod \
            --apim https://localhost:9443 \
            --token https://localhost:9443/oauth2/token

      - name: Login to WSO2 TenantB
        run: |
          apictl login logistics-prod \
            -u ${{ secrets.LOGISTICS_ADMIN_USER }} \
            -p ${{ secrets.LOGISTICS_ADMIN_PASSWORD }} \
            -k

      - name: Deploy Shipment API
        run: |
          apictl import api \
            -f api-definitions/shipment-api.yaml \
            -e logistics-prod \
            -k --update
          echo "ShipmentAPI deployed"

      - name: Deploy Route API
        run: |
          apictl import api \
            -f api-definitions/route-api.yaml \
            -e logistics-prod \
            -k --update
          echo "RouteAPI deployed"

      - name: List deployed APIs
        run: apictl get apis -e logistics-prod -k

      - name: Logout
        if: always()
        run: apictl logout logistics-prod -k 2>/dev/null || true

  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: self-hosted
    needs: [deploy-tenantA, deploy-tenantB]
    steps:
      - name: Get TenantA token
        id: tokenA
        run: |
          TOKEN=$(curl -k -s -X POST https://localhost:9443/oauth2/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${{ secrets.FINANCE_CLIENT_ID }}&client_secret=${{ secrets.FINANCE_CLIENT_SECRET }}&scope=invoice:read payment:read" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Test Invoice API
        run: |
          STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.tokenA.outputs.token }}" \
            https://localhost:8243/t/finance.com/invoices/1.0/invoices)
          echo "InvoiceAPI: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Test Payment API
        run: |
          STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.tokenA.outputs.token }}" \
            https://localhost:8243/t/finance.com/paymentapi/1.0/payments)
          echo "PaymentAPI: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Get TenantB token
        id: tokenB
        run: |
          TOKEN=$(curl -k -s -X POST https://localhost:9443/oauth2/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${{ secrets.LOGISTICS_CLIENT_ID }}&client_secret=${{ secrets.LOGISTICS_CLIENT_SECRET }}&scope=shipment:read route:read" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Test Shipment API
        run: |
          STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.tokenB.outputs.token }}" \
            https://localhost:8243/t/logistics.com/shipmentapi/1.0/shipments)
          echo "ShipmentAPI: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Test Route API
        run: |
          STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.tokenB.outputs.token }}" \
            https://localhost:8243/t/logistics.com/routeapi/1.0/routes)
          echo "RouteAPI: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: All tests passed
        run: echo "All 4 APIs returned 200 — deployment verified successfully"

  notify-slack:
    name: Slack Notification
    runs-on: self-hosted
    needs: [lint-api-specs, deploy-tenantA, deploy-tenantB, smoke-test]
    if: always()
    steps:
      - name: Send notification
        run: |
          if [ "${{ needs.smoke-test.result }}" = "success" ]; then
            EMOJI="✅"; COLOR="good"; MSG="Deployment Successful — all 4 APIs verified"
          elif [ "${{ needs.lint-api-specs.result }}" = "failure" ]; then
            EMOJI="❌"; COLOR="danger"; MSG="Lint Failed — deploy blocked"
          else
            EMOJI="⚠️"; COLOR="warning"; MSG="Deployment Failed — check logs"
          fi

          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"$EMOJI *WSO2 Pipeline — $MSG*\",
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"fields\": [
                  {\"title\": \"Repo\", \"value\": \"${{ github.repository }}\", \"short\": true},
                  {\"title\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"short\": true},
                  {\"title\": \"Actor\", \"value\": \"${{ github.actor }}\", \"short\": true},
                  {\"title\": \"Lint\", \"value\": \"${{ needs.lint-api-specs.result }}\", \"short\": true},
                  {\"title\": \"TenantA\", \"value\": \"${{ needs.deploy-tenantA.result }}\", \"short\": true},
                  {\"title\": \"TenantB\", \"value\": \"${{ needs.deploy-tenantB.result }}\", \"short\": true},
                  {\"title\": \"Smoke Test\", \"value\": \"${{ needs.smoke-test.result }}\", \"short\": true},
                  {\"title\": \"Run\", \"value\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"short\": false}
                ]
              }]
            }"
