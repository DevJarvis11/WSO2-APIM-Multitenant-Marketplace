name: WSO2 API Deployment Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'api-definitions/**'
      - 'tenantA-finance/**'
      - 'tenantB-logistics/**'
      - 'docker-compose.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'local'
        type: choice
        options: [local, staging, production]
      tenant:
        description: 'Deploy which tenant'
        required: true
        default: 'both'
        type: choice
        options: [both, tenantA, tenantB]

env:
  APICTL_VERSION: '4.6.0'
  WSO2_HOST: ${{ secrets.WSO2_HOST }}
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:

  # ─── Job 1: Lint OpenAPI specs ────────────────────────────────────────────
  lint-api-specs:
    name: Lint OpenAPI Specifications
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli

      - name: Create Spectral ruleset
        run: |
          cat > .spectral.yaml << 'SPECTRAL'
          extends: ["spectral:oas"]
          rules:
            api-must-have-description:
              message: "API must have a description"
              given: "$.info"
              severity: error
              then:
                field: description
                function: truthy
            paths-must-be-lowercase:
              message: "API paths must be lowercase"
              given: "$.paths[*]~"
              severity: warn
              then:
                function: pattern
                functionOptions:
                  match: "^[a-z0-9/_{}.-]+$"
            operations-must-have-security:
              message: "All operations must define security"
              given: "$.paths[*][get,post,put,delete,patch]"
              severity: error
              then:
                field: security
                function: defined
          SPECTRAL

      - name: Lint Invoice API
        run: spectral lint api-definitions/invoice-api.yaml --ruleset .spectral.yaml

      - name: Lint Payment API
        run: spectral lint api-definitions/payment-api.yaml --ruleset .spectral.yaml

      - name: Lint Shipment API
        run: spectral lint api-definitions/shipment-api.yaml --ruleset .spectral.yaml

      - name: Lint Route API
        run: spectral lint api-definitions/route-api.yaml --ruleset .spectral.yaml

      - name: Notify Slack on lint failure
        if: failure()
        run: |
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "❌ *WSO2 API Lint Failed*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Repository", "value": "${{ github.repository }}", "short": true},
                  {"title": "Branch", "value": "${{ github.ref_name }}", "short": true},
                  {"title": "Triggered by", "value": "${{ github.actor }}", "short": true},
                  {"title": "Action", "value": "Fix OpenAPI spec violations before deploy", "short": false}
                ]
              }]
            }'

  # ─── Job 2: Deploy TenantA APIs ───────────────────────────────────────────
  deploy-tenantA:
    name: Deploy TenantA — finance.com
    runs-on: self-hosted
    needs: lint-api-specs
    if: |
      github.event.inputs.tenant == 'both' ||
      github.event.inputs.tenant == 'tenantA' ||
      github.event_name == 'push'
    environment:
      name: finance-production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download apictl
        run: |
          curl -sL \
            "https://github.com/wso2/product-apim-tooling/releases/download/v${{ env.APICTL_VERSION }}/apictl-${{ env.APICTL_VERSION }}-linux-amd64.tar.gz" \
            -o apictl.tar.gz || true

          # Fallback: check if download succeeded
          if [ ! -s apictl.tar.gz ] || [ $(wc -c < apictl.tar.gz) -lt 1000 ]; then
            echo "Direct download failed — using cached version"
            # In real setup this would pull from your artifact store
            exit 1
          fi

          tar -xzf apictl.tar.gz
          sudo mv apictl/apictl /usr/local/bin/
          apictl version

      - name: Add WSO2 environment
        run: |
          apictl add env finance-prod \
            --apim https://${{ env.WSO2_HOST }}:9443 \
            --token https://${{ env.WSO2_HOST }}:9443/oauth2/token

      - name: Login to WSO2 as TenantA admin
        run: |
          apictl login finance-prod \
            -u ${{ secrets.FINANCE_ADMIN_USER }} \
            -p ${{ secrets.FINANCE_ADMIN_PASSWORD }} \
            -k

      - name: Deploy Invoice API
        run: |
          echo "Deploying InvoiceAPI to finance.com..."
          apictl import api \
            -f api-definitions/invoice-api.yaml \
            -e finance-prod \
            -k \
            --update
          echo "InvoiceAPI deployed successfully"

      - name: Deploy Payment API
        run: |
          echo "Deploying PaymentAPI to finance.com..."
          apictl import api \
            -f api-definitions/payment-api.yaml \
            -e finance-prod \
            -k \
            --update
          echo "PaymentAPI deployed successfully"

      - name: Verify TenantA deployments
        run: |
          echo "Verifying TenantA API deployments..."
          apictl get apis -e finance-prod -k

      - name: Logout TenantA
        if: always()
        run: apictl logout finance-prod -k || true

  # ─── Job 3: Deploy TenantB APIs ───────────────────────────────────────────
  deploy-tenantB:
    name: Deploy TenantB — logistics.com
    runs-on: self-hosted
    needs: lint-api-specs
    if: |
      github.event.inputs.tenant == 'both' ||
      github.event.inputs.tenant == 'tenantB' ||
      github.event_name == 'push'
    environment:
      name: logistics-production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download apictl
        run: |
          curl -sL \
            "https://github.com/wso2/product-apim-tooling/releases/download/v${{ env.APICTL_VERSION }}/apictl-${{ env.APICTL_VERSION }}-linux-amd64.tar.gz" \
            -o apictl.tar.gz || true

          if [ ! -s apictl.tar.gz ] || [ $(wc -c < apictl.tar.gz) -lt 1000 ]; then
            echo "Direct download failed"
            exit 1
          fi

          tar -xzf apictl.tar.gz
          sudo mv apictl/apictl /usr/local/bin/
          apictl version

      - name: Add WSO2 environment
        run: |
          apictl add env logistics-prod \
            --apim https://${{ env.WSO2_HOST }}:9443 \
            --token https://${{ env.WSO2_HOST }}:9443/oauth2/token

      - name: Login to WSO2 as TenantB admin
        run: |
          apictl login logistics-prod \
            -u ${{ secrets.LOGISTICS_ADMIN_USER }} \
            -p ${{ secrets.LOGISTICS_ADMIN_PASSWORD }} \
            -k

      - name: Deploy Shipment API
        run: |
          echo "Deploying ShipmentAPI to logistics.com..."
          apictl import api \
            -f api-definitions/shipment-api.yaml \
            -e logistics-prod \
            -k \
            --update
          echo "ShipmentAPI deployed successfully"

      - name: Deploy Route API
        run: |
          echo "Deploying RouteAPI to logistics.com..."
          apictl import api \
            -f api-definitions/route-api.yaml \
            -e logistics-prod \
            -k \
            --update
          echo "RouteAPI deployed successfully"

      - name: Verify TenantB deployments
        run: |
          echo "Verifying TenantB API deployments..."
          apictl get apis -e logistics-prod -k

      - name: Logout TenantB
        if: always()
        run: apictl logout logistics-prod -k || true

  # ─── Job 4: Smoke test after deploy ───────────────────────────────────────
  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: self-hosted
    needs: [deploy-tenantA, deploy-tenantB]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get TenantA token
        id: tenantA-token
        run: |
          RESPONSE=$(curl -k -s -X POST \
            https://${{ env.WSO2_HOST }}:9443/oauth2/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ secrets.FINANCE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.FINANCE_CLIENT_SECRET }}" \
            -d "scope=invoice:read payment:read")
          TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Test Invoice API
        run: |
          STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.tenantA-token.outputs.token }}" \
            https://${{ env.WSO2_HOST }}:8243/t/finance.com/invoices/1.0/invoices)
          echo "InvoiceAPI status: $STATUS"
          [ "$STATUS" = "200" ] || (echo "Invoice API smoke test FAILED with $STATUS" && exit 1)

      - name: Test Payment API
        run: |
          STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.tenantA-token.outputs.token }}" \
            https://${{ env.WSO2_HOST }}:8243/t/finance.com/paymentapi/1.0/payments)
          echo "PaymentAPI status: $STATUS"
          [ "$STATUS" = "200" ] || (echo "Payment API smoke test FAILED with $STATUS" && exit 1)

      - name: Get TenantB token
        id: tenantB-token
        run: |
          RESPONSE=$(curl -k -s -X POST \
            https://${{ env.WSO2_HOST }}:9443/oauth2/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ secrets.LOGISTICS_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.LOGISTICS_CLIENT_SECRET }}" \
            -d "scope=shipment:read route:read")
          TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Test Shipment API
        run: |
          STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.tenantB-token.outputs.token }}" \
            https://${{ env.WSO2_HOST }}:8243/t/logistics.com/shipmentapi/1.0/shipments)
          echo "ShipmentAPI status: $STATUS"
          [ "$STATUS" = "200" ] || (echo "Shipment API smoke test FAILED with $STATUS" && exit 1)

      - name: Test Route API
        run: |
          STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.tenantB-token.outputs.token }}" \
            https://${{ env.WSO2_HOST }}:8243/t/logistics.com/routeapi/1.0/routes)
          echo "RouteAPI status: $STATUS"
          [ "$STATUS" = "200" ] || (echo "Route API smoke test FAILED with $STATUS" && exit 1)

      - name: All smoke tests passed
        run: echo "All 4 APIs responding with 200 — deployment verified"

  # ─── Job 5: Slack notification ────────────────────────────────────────────
  notify-slack:
    name: Slack Notification
    runs-on: self-hosted
    needs: [lint-api-specs, deploy-tenantA, deploy-tenantB, smoke-test]
    if: always()
    steps:
      - name: Determine overall status
        id: status
        run: |
          if [ "${{ needs.smoke-test.result }}" = "success" ]; then
            echo "color=good" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "text=Deployment Successful" >> $GITHUB_OUTPUT
          elif [ "${{ needs.lint-api-specs.result }}" = "failure" ]; then
            echo "color=danger" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "text=Lint Failed — Deploy Blocked" >> $GITHUB_OUTPUT
          else
            echo "color=warning" >> $GITHUB_OUTPUT
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
            echo "text=Deployment Failed" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "${{ steps.status.outputs.emoji }} *WSO2 API Pipeline — ${{ steps.status.outputs.text }}*",
              "attachments": [{
                "color": "${{ steps.status.outputs.color }}",
                "fields": [
                  {
                    "title": "Repository",
                    "value": "${{ github.repository }}",
                    "short": true
                  },
                  {
                    "title": "Branch",
                    "value": "${{ github.ref_name }}",
                    "short": true
                  },
                  {
                    "title": "Triggered by",
                    "value": "${{ github.actor }}",
                    "short": true
                  },
                  {
                    "title": "Commit",
                    "value": "${{ github.event.head_commit.message }}",
                    "short": false
                  },
                  {
                    "title": "Job Results",
                    "value": "Lint: ${{ needs.lint-api-specs.result }} | TenantA: ${{ needs.deploy-tenantA.result }} | TenantB: ${{ needs.deploy-tenantB.result }} | Smoke Test: ${{ needs.smoke-test.result }}",
                    "short": false
                  },
                  {
                    "title": "Pipeline URL",
                    "value": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                    "short": false
                  }
                ]
              }]
            }'
