openapi: 3.0.0
info:
  title: Invoice API
  version: '1.0'
  description: Finance tenant invoice management API
  contact:
    name: Finance API Support
    email: finance-api@finance.com
servers:
  - url: http://localhost:4001
tags:
  - name: Invoices
    description: Invoice management operations
paths:
  /invoices:
    get:
      tags: [Invoices]
      summary: List all invoices
      description: Returns a list of all invoices for the finance tenant
      operationId: listInvoices
      security:
        - OAuth2: [invoice:read]
      responses:
        '200':
          description: Array of invoice objects
    post:
      tags: [Invoices]
      summary: Create invoice
      description: Creates a new invoice record
      operationId: createInvoice
      security:
        - OAuth2: [invoice:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Invoice created successfully
  /invoices/{id}:
    get:
      tags: [Invoices]
      summary: Get invoice by ID
      description: Returns a single invoice by its ID
      operationId: getInvoice
      security:
        - OAuth2: [invoice:read]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice object
        '404':
          description: Invoice not found
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://localhost:9443/oauth2/token
          scopes:
            invoice:read: Read invoices
            invoice:write: Create invoices
