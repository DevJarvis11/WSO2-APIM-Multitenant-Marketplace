openapi: 3.0.0
info:
  title: Route API
  version: '1.0'
  description: Logistics tenant route information API
  contact:
    name: Logistics API Support
    email: logistics-api@logistics.com
servers:
  - url: http://localhost:4004
tags:
  - name: Routes
    description: Route information operations
paths:
  /routes:
    get:
      tags: [Routes]
      summary: List all routes
      description: Returns a list of all available routes
      operationId: listRoutes
      security:
        - OAuth2: [route:read]
      responses:
        '200':
          description: Array of route objects
  /routes/{id}:
    get:
      tags: [Routes]
      summary: Get route by ID
      description: Returns a single route by its ID
      operationId: getRoute
      security:
        - OAuth2: [route:read]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Route object
        '404':
          description: Route not found
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://localhost:9443/oauth2/token
          scopes:
            route:read: Read routes
