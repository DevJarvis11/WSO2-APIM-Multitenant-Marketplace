openapi: 3.0.0
info:
  title: Shipment API
  version: '1.0'
  description: Logistics tenant shipment management API
  contact:
    name: Logistics API Support
    email: logistics-api@logistics.com
servers:
  - url: http://localhost:4003
tags:
  - name: Shipments
    description: Shipment management operations
paths:
  /shipments:
    get:
      tags: [Shipments]
      summary: List all shipments
      description: Returns a list of all shipments for the logistics tenant
      operationId: listShipments
      security:
        - OAuth2: [shipment:read]
      responses:
        '200':
          description: Array of shipment objects
    post:
      tags: [Shipments]
      summary: Create shipment
      description: Creates a new shipment record
      operationId: createShipment
      security:
        - OAuth2: [shipment:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Shipment created successfully
  /shipments/{id}:
    get:
      tags: [Shipments]
      summary: Get shipment by ID
      description: Returns a single shipment by its ID
      operationId: getShipment
      security:
        - OAuth2: [shipment:read]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Shipment object
        '404':
          description: Shipment not found
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://localhost:9443/oauth2/token
          scopes:
            shipment:read: Read shipments
            shipment:write: Create shipments
