openapi: 3.0.0
info:
  title: Payment API
  version: '1.0'
  description: Finance tenant payment management
servers:
  - url: http://localhost:4002
paths:
  /payments:
    get:
      summary: List all payments
      operationId: listPayments
      security:
        - OAuth2: [payment:read]
      responses:
        '200':
          description: Array of payments
    post:
      summary: Create payment
      operationId: createPayment
      security:
        - OAuth2: [payment:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Created
  /payments/{id}:
    get:
      summary: Get payment by ID
      operationId: getPayment
      security:
        - OAuth2: [payment:read]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment
        '404':
          description: Not found
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://localhost:9443/oauth2/token
          scopes:
            payment:read: Read payments
            payment:write: Create payments