openapi: 3.0.0
info:
  title: Payment API
  version: '1.0'
  description: Finance tenant payment management API
  contact:
    name: Finance API Support
    email: finance-api@finance.com
servers:
  - url: http://localhost:4002
tags:
  - name: Payments
    description: Payment management operations
paths:
  /payments:
    get:
      tags: [Payments]
      summary: List all payments
      description: Returns a list of all payments for the finance tenant
      operationId: listPayments
      security:
        - OAuth2: [payment:read]
      responses:
        '200':
          description: Array of payment objects
    post:
      tags: [Payments]
      summary: Create payment
      description: Creates a new payment record
      operationId: createPayment
      security:
        - OAuth2: [payment:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Payment created successfully
  /payments/{id}:
    get:
      tags: [Payments]
      summary: Get payment by ID
      description: Returns a single payment by its ID
      operationId: getPayment
      security:
        - OAuth2: [payment:read]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment object
        '404':
          description: Payment not found
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://localhost:9443/oauth2/token
          scopes:
            payment:read: Read payments
            payment:write: Create payments
